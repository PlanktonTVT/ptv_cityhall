<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Markthalle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside id="interaction" class="interaction" aria-hidden="true">
        <div class="interaction__panel">
            <div class="interaction__key" id="interactionKey">G</div>
            <div class="interaction__content">
                <p id="interactionEyebrow" class="interaction__eyebrow">Interaktion</p>
                <h2 id="interactionTitle" class="interaction__title">Markthalle</h2>
                <p id="interactionMessage" class="interaction__message">Bürger, Wahlen und Marktverwaltung</p>
                <p id="interactionAction" class="interaction__action">Druecke G zum Oeffnen</p>
            </div>
        </div>
    </aside>

    <main id="app" class="app hidden">
        <header class="topbar">
            <div>
                <p class="eyebrow" id="townName">Stadt</p>
                <h1 id="windowTitle">Markthalle</h1>
            </div>
            <button id="closeBtn" class="icon-button" type="button" aria-label="Schliessen">X</button>
        </header>

        <section class="summary">
            <div>
                <span>Warensteuer</span>
                <strong id="goodsTaxRate">A 0.00% / V 0.00%</strong>
            </div>
            <div>
                <span>Waffensteuer</span>
                <strong id="weaponsTaxRate">A 0.00% / V 0.00%</strong>
            </div>
            <div>
                <span>Stadtkasse</span>
                <strong id="treasury">$0.00</strong>
            </div>
            <div>
                <span>Positionen</span>
                <strong id="itemCount">0</strong>
            </div>
        </section>

        <nav id="mainTabs" class="main-tabs"></nav>

        <section id="managerPanel" class="manager-panel hidden">
            <strong>Admin-Preisverwaltung</strong>
            <span>Preise pro Ware, Steuern einheitlich pro Reiter.</span>
            <div id="taxInputs" class="tax-inputs"></div>
            <button id="setTaxBtn" type="button">Steuern</button>
        </section>

        <nav id="tabs" class="tabs"></nav>

        <section id="items" class="items"></section>

        <p id="message" class="message"></p>
    </main>

    <script src="app.js"></script>
</body>
</html>
